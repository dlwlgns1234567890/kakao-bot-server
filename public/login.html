<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봇 관리자 — 로그인</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #5eead4;
    --text: #e2e2f0;
    --muted: #555570;
    --danger: #f87171;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .grid-bg {
    position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(124,106,247,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,247,.12) 0%, transparent 70%);
    top: -200px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }
  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 380px;
    box-shadow: 0 0 60px rgba(124,106,247,.08);
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 36px;
    background: linear-gradient(135deg, #e2e2f0, #7c6af7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  input[type=password] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 24px;
  }
  input[type=password]:focus { border-color: var(--accent); }
  button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: opacity .2s, transform .1s;
  }
  button:hover { opacity: .9; }
  button:active { transform: scale(.98); }
  .error {
    background: rgba(248,113,113,.1);
    border: 1px solid rgba(248,113,113,.3);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--danger);
    font-size: 13px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow"></div>
<div class="card">
  <div class="logo">KakaoBot Admin</div>
  <h1>관리자 로그인</h1>
  <form method="POST" action="/login">
    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••" autofocus>
    <button type="submit">로그인</button>
  </form>
  <script>
    if (location.search.includes('error'))
      document.querySelector('form').insertAdjacentHTML('afterbegin','<div class="error">⚠ 비밀번호가 틀렸습니다.</div>');
  </script>
</div>
</body>
</html>
